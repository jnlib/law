<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 법령 검색 — 종로도서관</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f172a;
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --primary-light: #eff6ff;
  --bg: #f8fafc;
  --card: #ffffff;
  --txt-main: #1e293b;
  --txt-muted: #64748b;
  --txt-light: #94a3b8;
  --border: #e2e8f0;
  --shadow: 0 4px 12px -2px rgba(0,0,0,0.05), 0 2px 6px -1px rgba(0,0,0,0.03);
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', 'Noto Sans KR', sans-serif;
  background-color: var(--bg);
  color: var(--txt-main);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.hdr {
  background: var(--navy);
  background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
  padding: 48px 24px 80px;
  text-align: center;
}
.hdr-inner { max-width: 800px; margin: 0 auto; }
.hdr-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 32px;
}
.hdr-logo img { height: 24px; filter: brightness(0) invert(1); }
.hdr-logo span { color: #fff; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }

.search-container {
  position: relative;
  max-width: 700px;
  margin: 0 auto;
}
.search-box {
  display: flex;
  background: #fff;
  padding: 8px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}
.search-box:focus-within { transform: translateY(-2px); }
.search-box input {
  flex: 1;
  border: none;
  padding: 16px 24px;
  font-size: 17px;
  font-family: inherit;
  outline: none;
  border-radius: 12px;
}
.search-box button {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 0 32px;
  border-radius: 14px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.2s;
}
.search-box button:hover { background: var(--primary-hover); }

/* Main Content */
.wrap {
  max-width: 850px;
  margin: -40px auto 60px;
  padding: 0 20px;
  position: relative;
  z-index: 10;
}

/* Filters */
.filters {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  overflow-x: auto;
  padding-bottom: 8px;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.fbtn {
  white-space: nowrap;
  padding: 10px 20px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
  color: var(--txt-muted);
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow);
}
.fbtn.on {
  background: var(--navy);
  color: #fff;
  border-color: var(--navy);
}
.fbtn:hover:not(.on) { border-color: var(--primary); color: var(--primary); }

.result-info { font-size: 13px; color: var(--txt-light); margin-bottom: 16px; padding-left: 8px; }

/* Result Cards */
.law-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
.law-card:hover {
  transform: translateY(-4px);
  border-color: var(--primary);
  box-shadow: 0 12px 24px -8px rgba(37, 99, 235, 0.15);
}
.lc-badge {
  display: inline-flex;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.badge-law { background: #dcfce7; color: #166534; }
.badge-reg { background: #fef9c3; color: #854d0e; }
.badge-rule { background: #fee2e2; color: #991b1b; }

.lc-name { font-size: 18px; font-weight: 800; color: var(--navy); margin-bottom: 8px; display: block; }
.lc-article { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
.lc-content {
  font-size: 14px;
  color: var(--txt-muted);
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  line-height: 1.7;
}
.lc-footer {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid #f1f5f9;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--txt-light);
}

/* Detail Modal */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal {
  background: #fff;
  width: 100%;
  max-width: 750px;
  max-height: 90vh;
  border-radius: 24px;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  z-index: 10;
}
.modal-body {
  padding: 40px;
  overflow-y: auto;
}
.modal-title { font-size: 24px; font-weight: 900; color: var(--navy); margin-bottom: 12px; }
.modal-meta {
  font-size: 13px;
  color: var(--txt-muted);
  margin-bottom: 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.modal-content-box {
  background: var(--bg);
  padding: 24px;
  border-radius: 16px;
  margin-bottom: 24px;
}
.modal-article-title { font-size: 16px; font-weight: 800; color: var(--primary); margin-bottom: 12px; }
.modal-text { font-size: 15px; line-height: 1.8; white-space: pre-wrap; color: var(--txt-main); }

.modal-footer {
  padding: 24px 40px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
}
.btn {
  text-decoration: none;
  padding: 12px 24px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 14px;
  transition: all 0.2s;
  flex: 1;
  text-align: center;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-outline { border: 1.5px solid var(--border); color: var(--txt-muted); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

/* Paging */
.paging { display: flex; justify-content: center; gap: 8px; margin-top: 40px; }
.paging button {
  width: 40px; height: 40px;
  border: 1px solid var(--border);
  background: #fff;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}
.paging button.on { background: var(--navy); color: #fff; border-color: var(--navy); }

/* Empty/Loading */
.status-box { text-align: center; padding: 60px 0; color: var(--txt-light); }
.spinner {
  width: 40px; height: 40px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  margin: 0 auto 16px;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

mark { background: #fef08a; padding: 0 2px; }

@media (max-width: 600px) {
  .hdr { padding: 32px 16px 60px; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; flex-direction: column; }
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-logo">
      <img src="https://jnlib.sen.go.kr/resources/homepage/jnlib/img/jnlib_logo.png" alt="Library Logo">
      <span>AI 법령 검색</span>
    </div>
    <div class="search-container">
      <div class="search-box">
        <input type="text" id="q" placeholder="궁금한 법령이나 상황을 입력하세요" onkeydown="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()">검색</button>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="filters">
    <button class="fbtn on" data-s="0" onclick="setFilter(0,this)">📜 법령 조문</button>
    <button class="fbtn" data-s="1" onclick="setFilter(1,this)">📋 법령 별표·서식</button>
    <button class="fbtn" data-s="2" onclick="setFilter(2,this)">📝 행정규칙 조문</button>
    <button class="fbtn" data-s="3" onclick="setFilter(3,this)">📄 행정규칙 별표·서식</button>
  </div>
  
  <div id="info" class="result-info"></div>
  
  <div id="results">
    <div class="status-box">
      <div style="font-size: 64px; margin-bottom: 24px;">⚖️</div>
      <p style="font-size: 18px; color: var(--txt-main); font-weight: 700; margin-bottom: 8px;">지능형 법령 검색 시스템</p>
      <p>단순 검색을 넘어 AI가 가장 연관성 높은 조문을 찾아드려요.</p>
    </div>
  </div>
  
  <div id="paging" class="paging"></div>
</div>

<div id="overlay" class="overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeDetail()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// 배포된 Worker 주소를 입력하세요 (또는 배포 후 수정해 드립니다)
var WORKER_URL = 'https://law-worker.jnlib.workers.dev'; 
var SEARCH_TYPE = 0; 
var QUERY = '', PAGE = 1, DISPLAY = 15;

function setFilter(s, el) {
  SEARCH_TYPE = s;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('on', parseInt(b.dataset.s) === s));
  if (QUERY) doSearch();
}

async function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  QUERY = q;
  PAGE = 1;
  await loadResults();
}

async function loadResults() {
  const el = document.getElementById('results');
  el.innerHTML = '<div class="status-box"><div class="spinner"></div><p>AI가 법령을 분석하여 최적의 결과를 찾는 중입니다...</p></div>';
  document.getElementById('info').textContent = '';
  document.getElementById('paging').innerHTML = '';

  try {
    const url = `${WORKER_URL}/search?query=${encodeURIComponent(QUERY)}&search=${SEARCH_TYPE}&display=${DISPLAY}&page=${PAGE}`;
    const r = await fetch(url);
    const data = await r.json();

    if (data.error) throw new Error(data.error);

    const ai = data.aiSearch || data;
    const count = parseInt(ai['검색결과개수'] || '0');
    const keys = ['법령조문', '법령별표서식', '행정규칙조문', '행정규칙별표서식'];
    let items = ai[keys[SEARCH_TYPE]] || [];
    if (!Array.isArray(items)) items = [items];

    const typeNames = ['법령 조문', '법령 별표·서식', '행정규칙 조문', '행정규칙 별표·서식'];
    document.getElementById('info').textContent = `"${QUERY}" 검색결과 ${count}건 중 ${items.length}건 정렬됨`;

    if (!items.length) {
      el.innerHTML = '<div class="status-box"><p>검색 결과가 없습니다.</p></div>';
      return;
    }

    el.innerHTML = items.map(it => renderCard(it)).join('');
    renderPaging(count);

  } catch(e) {
    el.innerHTML = `<div class="status-box"><p style="color:red">오류 발생: ${e.message}</p></div>`;
  }
}

function renderCard(it) {
  const name = it.법령명 || it.행정규칙명 || '';
  const type = it.법령종류명 || it.행정규칙종류명 || '';
  const articleNo = (it.조문번호 || '').replace(/^0+/, '');
  const articleTitle = it.조문제목 || it.별표서식제목 || '';
  const content = it.조문내용 || '';
  const ministry = it.소관부처명 || it.발령기관명 || '';
  const date = it.시행일자 || it.발령일자 || '';
  
  let badgeClass = 'badge-law';
  if (type.includes('령')) badgeClass = 'badge-reg';
  if (type.includes('규칙')) badgeClass = 'badge-rule';

  return `
    <div class="law-card" onclick="openDetail(this)" data-it='${JSON.stringify(it).replace(/'/g, "&apos;")}'>
      <div class="lc-badge ${badgeClass}">${type}</div>
      <span class="lc-name">${esc(name)}</span>
      <div class="lc-article">${articleNo ? '제' + articleNo + '조 ' : ''}${esc(articleTitle)}</div>
      <div class="lc-content">${highlight(content, QUERY)}</div>
      <div class="lc-footer">
        <span>🏛 ${esc(ministry)}</span>
        <span>${fmtDate(date)} 시행</span>
      </div>
    </div>
  `;
}

function renderPaging(count) {
  const total = Math.ceil(count / DISPLAY);
  if (total <= 1) return;
  let html = '';
  const start = Math.max(1, PAGE - 2);
  const end = Math.min(total, start + 4);
  for (let i = start; i <= end; i++) {
    html += `<button class="${i === PAGE ? 'on' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  document.getElementById('paging').innerHTML = html;
}

function goPage(p) { PAGE = p; loadResults(); window.scrollTo(0,0); }

function openDetail(card) {
  const it = JSON.parse(card.dataset.it);
  const name = it.법령명 || it.행정규칙명 || '';
  const articleNo = (it.조문번호 || '').replace(/^0+/, '');
  const articleTitle = it.조문제목 || it.별표서식제목 || '';
  const content = it.조문내용 || '';
  const lawId = it.법령일련번호 || it.행정규칙일련번호 || '';
  
  // 국법센터 상세 링크 생성
  const siteUrl = SEARCH_TYPE < 2 
    ? `https://www.law.go.kr/LSW/lsInfoP.do?lsiSeq=${lawId}`
    : `https://www.law.go.kr/LSW/admRulInfoP.do?admRulSeq=${lawId}`;

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-body">
      <div class="modal-title">${esc(name)}</div>
      <div class="modal-meta">
        <span><b>${it.법령종류명 || it.행정규칙종류명 || ''}</b></span>
        <span>소관: ${it.소관부처명 || it.발령기관명 || ''}</span>
        <span>시행일: ${fmtDate(it.시행일자 || it.발령일자)}</span>
      </div>
      <div class="modal-content-box">
        <div class="modal-article-title">${articleNo ? '제' + articleNo + '조 ' : ''}${esc(articleTitle)}</div>
        <div class="modal-text">${highlight(content, QUERY)}</div>
      </div>
    </div>
    <div class="modal-footer">
      <a href="${siteUrl}" target="_blank" class="btn btn-primary">국가법령정보센터에서 보기</a>
      <button onclick="closeDetail()" class="btn btn-outline">닫기</button>
    </div>
  `;
  document.getElementById('overlay').style.display = 'flex';
}

function closeDetail() { document.getElementById('overlay').style.display = 'none'; }
function esc(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : ''; }
function fmtDate(d) {
  const s = String(d || '').replace(/\D/g, '');
  return s.length >= 8 ? `${s.slice(0,4)}.${s.slice(4,6)}.${s.slice(6,8)}` : d;
}
function highlight(txt, q) {
  if (!txt || !q) return esc(txt);
  let html = esc(txt);
  q.split(' ').filter(w => w.length > 1).forEach(w => {
    const re = new RegExp(`(${w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    html = html.replace(re, '<mark>$1</mark>');
  });
  return html;
}

// Overlay 클릭 시 닫기
document.getElementById('overlay').onclick = e => { if (e.target.id === 'overlay') closeDetail(); };
</script>
</body>
</html>
